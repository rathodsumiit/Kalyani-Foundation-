<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalyani Foundation Verification</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}

body{
  background: #f5f7fb;
}

/* 🔥 NAVBAR */
.navbar{
  width:100%;
  background:#0f6ae8;
  padding:15px 0;
  position:fixed;
  top:0;
  left:0;
  z-index:1000;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.navbar ul{
  display:flex;
  justify-content:center;
  list-style:none;
  gap:40px;
}

.navbar ul li a{
  color:white;
  text-decoration:none;
  font-size:16px;
  font-weight:500;
  transition:0.3s;
}

.navbar ul li a:hover{
  color:#ffd700;
}

/* 🔥 CENTER AREA */
.wrapper{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding-top:80px;
}

/* CARD */
.container{
  background:#fff;
  padding:40px;
  border-radius:20px;
  text-align:center;
  max-width:420px;
  box-shadow:0 20px 50px rgba(0,0,0,0.15);
  animation: fadeIn 1s ease;
}

/* LOGO */
.logo{
  width:80px;
  margin-bottom:10px;
}

/* CHECKMARK */
.checkmark{
  width:80px;
  height:80px;
  margin:20px auto;
}

.checkmark circle{
  stroke: #28a745;
  stroke-width: 4;
  fill:none;
  stroke-dasharray: 166;
  stroke-dashoffset: 166;
  animation: stroke 0.6s forwards;
}

.checkmark path{
  stroke:#28a745;
  stroke-width:4;
  fill:none;
  stroke-dasharray: 48;
  stroke-dashoffset: 48;
  animation: stroke 0.4s 0.6s forwards;
}

@keyframes stroke{
  to{ stroke-dashoffset:0; }
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* TEXT */
h2{
  color:#28a745;
  margin-bottom:10px;
}

p{
  font-size:16px;
  color:#444;
  line-height:1.6;
}
</style>
</head>

<body>

<!-- 🔥 NAVBAR (Same as your main site) -->
<div class="navbar">
  <ul>
    <li><a href="index.html#about">About</a></li>
    <li><a href="index.html#services">Services</a></li>
    <li><a href="index.html#causes">Causes</a></li>
    <li><a href="index.html#events">Events</a></li>
    <li><a href="index.html#gallery">Gallery</a></li>
    <li><a href="index.html#contact">Contact</a></li>
  </ul>
</div>

<!-- 🔥 VERIFICATION CARD -->
<div class="wrapper">
  <div class="container">



    <!-- Tick -->
    <svg class="checkmark" viewBox="0 0 52 52">
      <circle cx="26" cy="26" r="25"/>
      <path d="M14 27 L22 35 L38 18"/>
    </svg>

    <h2 id="title">Verifying...</h2>
    <p id="msg"></p>

  </div>
</div>

<script>
const data = {
  "KF001": "Nilkanth Puspurwar",
  "KF002": "Priya Patil",
  "KF003": "Sumit Rathod"
};

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const title = document.getElementById("title");
const msg = document.getElementById("msg");

if(data[id]){
  title.innerHTML = "Verification Successful!";
  msg.innerHTML = `<b>${data[id]}</b> has successfully completed their volunteer work with <b>Kalyani Foundation</b>.`;
}else{
  title.style.color = "red";
  title.innerHTML = "Invalid Certificate";
  msg.innerHTML = "The certificate you are trying to verify is not valid.";
}
</script>

</body>
</html>
